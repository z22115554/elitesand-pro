<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B141F">
  <title>Elitesand Pro 遙控器</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/controller-new.css">
</head>
<body class="controller">
  <div id="connection-banner" class="connection-banner">與伺服器連線中斷，重新連線中…</div>

  <div class="ctrl-top">
    <span class="brand">Elitesand Pro</span>
    <div class="right">
      <span class="conn">
        <span id="connection-status" class="status-dot disconnected"></span>
        <span id="connection-text">連線中</span>
      </span>
      <button class="theme-toggle" type="button" title="切換主題" aria-label="切換主題">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      </button>
    </div>
  </div>

  <div class="ctrl-np">
    <div id="album-art" class="cover"></div>
    <div>
      <div id="track-title" class="title">尚未播放</div>
      <div id="track-artist" class="artist"></div>
    </div>
  </div>

  <div class="ctrl-progress">
    <div id="progress-track" class="track">
      <div id="progress-fill" class="fill"></div>
    </div>
    <div class="times">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <div class="ctrl-transport">
    <button id="btn-prev" class="step" type="button" aria-label="上一首">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6v12l-9-6z"/></svg>
    </button>
    <button id="btn-play" class="play" type="button" aria-label="播放或暫停"><span id="play-icon">▶</span></button>
    <button id="btn-next" class="step" type="button" aria-label="下一首">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l9 6-9 6z"/></svg>
    </button>
  </div>

  <button id="btn-emergency" class="ctrl-emergency" type="button">緊急隱藏歌詞</button>

  <div class="ctrl-card">
    <p class="eyebrow">歌詞時間偏移</p>
    <div class="ctrl-offset">
      <button id="offset-minus05" type="button">−0.5s</button>
      <button id="offset-minus01" type="button">−0.1s</button>
      <button id="offset-reset" type="button">歸零</button>
      <button id="offset-plus01" type="button">+0.1s</button>
      <button id="offset-plus05" type="button">+0.5s</button>
      <span id="offset-display" class="disp">0.0s</span>
    </div>
  </div>

  <div class="ctrl-card">
    <p class="eyebrow">語言顯示</p>
    <div class="ctrl-chips">
      <button class="ctrl-mode-btn active" data-mode="original" type="button">原文</button>
      <button class="ctrl-mode-btn" data-mode="romanized" type="button">拼音</button>
      <button class="ctrl-mode-btn" data-mode="both" type="button">原文+拼音</button>
      <button class="ctrl-mode-btn" data-mode="xieyin" type="button">原文+諧音</button>
      <button class="ctrl-mode-btn" data-mode="full" type="button">全部</button>
    </div>
  </div>

  <div class="ctrl-card">
    <p class="eyebrow">歌詞模板</p>
    <div class="ctrl-chips ctrl-template-chips">
      <button class="ctrl-template-btn active" data-template="classic" type="button">經典疊層</button>
      <button class="ctrl-template-btn" data-template="luminous" type="button">星砂流光</button>
      <button class="ctrl-template-btn" data-template="partita" type="button">折光階梯</button>
      <button class="ctrl-template-btn" data-template="tilt" type="button">斜拍告白</button>
      <button class="ctrl-template-btn" data-template="mindscape" type="button">潮汐心景</button>
      <button class="ctrl-template-btn" data-template="ktv" type="button">霓彩伴唱</button>
      <button class="ctrl-template-btn" data-template="columnflow" type="button">直書句流</button>
    </div>
    <div id="ctrl-lyric-position-group">
      <p class="ctrl-sub-label">位置</p>
      <div class="ctrl-chips">
        <button class="ctrl-position-btn active" data-position="center" type="button">置中</button>
        <button class="ctrl-position-btn" data-position="left" type="button">偏左</button>
        <button class="ctrl-position-btn" data-position="right" type="button">偏右</button>
        <button class="ctrl-position-btn" data-position="split" type="button">左右分散</button>
      </div>
    </div>
    <div id="ctrl-columnflow-variant-group" hidden>
      <p class="ctrl-sub-label">直書句流樣式</p>
      <div class="ctrl-chips">
        <button class="ctrl-columnflow-variant-btn active" data-columnflow-variant="sen" type="button">素筆直書</button>
        <button class="ctrl-columnflow-variant-btn" data-columnflow-variant="fuda" type="button">字札直書</button>
      </div>
    </div>
    <div id="ctrl-columnflow-placement-group" hidden>
      <p class="ctrl-sub-label">直書位置</p>
      <div class="ctrl-chips">
        <button class="ctrl-columnflow-placement-btn" data-columnflow-placement="left" type="button">偏左</button>
        <button class="ctrl-columnflow-placement-btn" data-columnflow-placement="right" type="button">偏右</button>
        <button class="ctrl-columnflow-placement-btn active" data-columnflow-placement="split" type="button">左右分散</button>
      </div>
    </div>
    <div id="ctrl-columnflow-max-lines-group" hidden>
      <p class="ctrl-sub-label">同時保留句數</p>
      <div class="ctrl-chips">
        <button class="ctrl-columnflow-max-lines-btn" data-columnflow-max-lines="1" type="button">1 句</button>
        <button class="ctrl-columnflow-max-lines-btn" data-columnflow-max-lines="2" type="button">2 句</button>
        <button class="ctrl-columnflow-max-lines-btn" data-columnflow-max-lines="3" type="button">3 句</button>
        <button class="ctrl-columnflow-max-lines-btn active" data-columnflow-max-lines="4" type="button">4 句</button>
        <button class="ctrl-columnflow-max-lines-btn" data-columnflow-max-lines="5" type="button">5 句</button>
        <button class="ctrl-columnflow-max-lines-btn" data-columnflow-max-lines="6" type="button">6 句</button>
      </div>
    </div>
    <p class="ctrl-sub-label">動態強度</p>
    <div class="ctrl-chips">
      <button class="ctrl-intensity-btn" data-intensity="calm" type="button">靜</button>
      <button class="ctrl-intensity-btn active" data-intensity="normal" type="button">中</button>
      <button class="ctrl-intensity-btn" data-intensity="chaotic" type="button">強</button>
    </div>
    <div class="ctrl-preset-row">
      <select id="ctrl-lyric-preset" class="input" aria-label="歌詞外觀預設"><option value="">尚未保存預設</option></select>
      <button id="ctrl-lyric-preset-apply" class="btn btn-sm" type="button">套用</button>
    </div>
  </div>

  <div class="ctrl-card">
    <p class="eyebrow">配色風格（經典疊層）</p>
    <div class="ctrl-chips">
      <button class="ctrl-style-btn active" data-style="cute" type="button">可愛</button>
      <button class="ctrl-style-btn" data-style="rock" type="button">搖滾</button>
      <button class="ctrl-style-btn" data-style="ballad" type="button">抒情</button>
    </div>
  </div>

  <div class="ctrl-card">
    <p class="eyebrow">變調 / 變速</p>
    <div class="ctrl-stepper-row">
      <span class="lbl">變調</span>
      <div class="ctrl-stepper">
        <button id="ctrl-pitch-down" class="ctrl-stepper-btn" type="button" aria-label="降一個半音">−</button>
        <span id="ctrl-pitch-value" class="ctrl-stepper-val">0</span>
        <button id="ctrl-pitch-up" class="ctrl-stepper-btn" type="button" aria-label="升一個半音">+</button>
      </div>
      <button id="ctrl-pitch-reset" class="btn btn-sm btn-ghost" type="button">重置</button>
      <input id="ctrl-pitch-slider" type="range" min="-12" max="12" step="1" value="0" hidden>
    </div>
    <div class="ctrl-stepper-row">
      <span class="lbl">變速</span>
      <div class="ctrl-stepper">
        <button id="ctrl-speed-down" class="ctrl-stepper-btn" type="button" aria-label="減速">−</button>
        <span id="ctrl-speed-value" class="ctrl-stepper-val">1.00x</span>
        <button id="ctrl-speed-up" class="ctrl-stepper-btn" type="button" aria-label="加速">+</button>
      </div>
      <button id="ctrl-speed-reset" class="btn btn-sm btn-ghost" type="button">重置</button>
      <input id="ctrl-speed-slider" type="range" min="0.5" max="1.5" step="0.05" value="1" hidden>
    </div>
    <div class="ctrl-switch-row">
      <span>前奏倒數提示</span>
      <label class="switch"><input id="ctrl-metronome-toggle" type="checkbox" checked><span class="track"></span></label>
    </div>
  </div>

  <div class="ctrl-card">
    <p class="eyebrow">歌詞</p>
    <div class="ctrl-lyric-btns">
      <button id="btn-lyrics-paste" class="btn" type="button">貼上歌詞</button>
      <button id="btn-lyrics-drop" class="btn btn-ghost" type="button">上傳檔案</button>
      <input id="lyrics-file-input" type="file" accept=".lrc,.srt,.txt" hidden>
    </div>
  </div>

  <div class="ctrl-card">
    <button id="playlist-toggle" class="ctrl-playlist-toggle" type="button">
      <span>播放清單</span>
      <span id="toggle-arrow" class="arrow">▾</span>
    </button>
    <div id="playlist" class="ctrl-playlist">
      <div class="ctrl-playlist-empty"><div>尚無歌曲</div><div class="hint">請從控制面板新增歌曲</div></div>
    </div>
  </div>

  <div id="lyrics-paste-modal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3>貼上歌詞</h3>
        <button id="lyrics-paste-cancel" class="btn btn-sm btn-ghost" type="button">取消</button>
      </div>
      <div class="modal-body">
        <textarea id="lyrics-paste-textarea" class="input" placeholder="貼上 LRC 或純文字歌詞…" style="min-height:200px"></textarea>
        <button id="lyrics-paste-confirm" class="btn btn-primary" type="button" style="width:100%;margin-top:12px">套用歌詞</button>
      </div>
    </div>
  </div>

  <div id="ctrl-toast" class="toast"></div>

  <!-- PIN 保護：伺服器設定 PIN 後，連線被拒會跳出這個要求輸入的視窗（見 public/js/pin-auth.js） -->
  <div id="pin-required-modal" class="modal" hidden>
    <div class="modal-card" style="max-width:320px">
      <div class="modal-head"><h3>需要 PIN</h3></div>
      <div class="modal-body">
        <p class="field-hint" style="margin-top:0">這台裝置需要輸入 PIN 才能操作 Elitesand Pro。</p>
        <input id="pin-required-input" class="input" type="password" inputmode="numeric" autocomplete="off" placeholder="輸入 PIN" style="margin-bottom:10px">
        <div id="pin-required-error" style="color:var(--danger);font-size:12px;margin-bottom:10px;display:none"></div>
        <button id="pin-required-submit" class="btn btn-primary" type="button" style="width:100%">確認</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/shared-utils.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/pin-auth.js"></script>
  <script src="/js/socket-client.js"></script>
  <script src="/js/styles.js"></script>
  <script src="/js/error-handler.js"></script>
  <script src="/js/controller.js"></script>
</body>
</html>
